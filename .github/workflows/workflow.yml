name: Judge

on:
  push:
    branches: [main]

jobs:
  judge:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build student image
        run: docker build -t student-app:latest .

      - name: Run judge
        uses: KnOkEr350/judge-action@v1
        with:
          image: student-app:latest